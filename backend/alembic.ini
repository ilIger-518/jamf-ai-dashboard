# A generic, single database configuration.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os  # Use os.pathsep
sqlalchemy.url = postgresql+asyncpg://jamfdash:changeme@localhost:5432/jamfdash

[post_write_hooks]
# Uncomment to auto-format migrations with ruff
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/../.venv/bin/ruff
# ruff.options = --fix MIGRATION_SCRIPT

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
